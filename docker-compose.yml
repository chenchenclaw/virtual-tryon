services:
  postgres:
    image: postgres:16-alpine
    container_name: tryon-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: tryon
      POSTGRES_PASSWORD: tryon123
      POSTGRES_DB: virtual_tryon
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: tryon-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
